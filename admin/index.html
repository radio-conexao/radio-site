<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.1.11/dist/decap-cms.js"></script>
  </head>
  <body>
    <h2 style="text-align:center;">Carregando CMS...</h2>

    <script>
      window.CMS_MANUAL_INIT = true;

      window.addEventListener("load", function () {
        if (window.CMS) {
          window.CMS.init({
            config: "/admin/config.yml"
          });
        } else {
          document.body.innerHTML = "<h2>Erro: CMS não carregou</h2>";
        }
      });
    </script>
  </body>
</html>
