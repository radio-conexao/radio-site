<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Conexão - A rádio que te liga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary: #ffcc00; /* Amarelo Conexão */
            --secondary: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* Espaço para o player fixo */
        }

        /* Header e Logo */
        header {
            background-color: var(--secondary);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }

        .logo {
            max-width: 200px;
        }

        /* Banner */
        .banner-container {
            width: 100%;
            overflow: hidden;
            background: #111;
        }

        .banner-container img {
            width: 100%;
            display: block;
        }

        /* Seções */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Grid de Entrevistas */
        .entrevistas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card-entrevista {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #333;
        }

        .card-entrevista:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card-entrevista img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        /* Player Fixo Rodapé */
        .player-fixo {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--primary);
            padding: 15px 0;
            z-index: 1000;
        }

        .player-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .social-icons a {
            color: var(--text);
            font-size: 24px;
            margin: 0 10px;
            transition: 0.3s;
        }

        .social-icons a:hover {
            color: var(--primary);
        }

        audio {
            height: 40px;
            filter: sepia(100%) saturate(500%) hue-rotate(10deg); /* Deixa o player amarelado */
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/logo.png" alt="Rádio Conexão" class="logo">
    </header>

    <div class="banner-container">
        <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/banner.png" alt="Destaque">
    </div>

    <div class="container">
        
        <!-- SEÇÃO ENTREVISTAS (ANTIGO PODCAST) -->
        <section id="entrevistas">
            <h2><i class="fas fa-microphone-lines"></i> Últimas Entrevistas</h2>
            <div class="entrevistas-grid">
                <!-- Card 1 -->
                <div class="card-entrevista">
                    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista1.jpg" alt="Entrevista">
                    <div class="card-content">
                        <h3>Título da Entrevista 01</h3>
                        <p>Breve descrição sobre quem foi o entrevistado.</p>
                        <button onclick="window.open('LINK_DO_YOUTUBE_OU_AUDIO')">Ouvir Agora</button>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="card-entrevista">
                    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista2.jpg" alt="Entrevista">
                    <div class="card-content">
                        <h3>Título da Entrevista 02</h3>
                        <p>Breve descrição sobre quem foi o entrevistado.</p>
                        <button onclick="window.open('LINK_DO_YOUTUBE_OU_AUDIO')">Ouvir Agora</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- SEÇÃO REDES SOCIAIS -->
        <section id="social">
            <h2><i class="fas fa-share-nodes"></i> Conecte-se</h2>
            <div style="text-align: center; padding: 20px; background: #1a1a1a; border-radius: 10px;">
                <p>Siga nossa rádio nas redes sociais e fique por dentro de tudo!</p>
                <div class="social-icons" style="font-size: 40px;">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </section>

    </div>

    <!-- PLAYER FIXO -->
    <div class="player-fixo">
        <div class="player-content">
            <div style="display: flex; align-items: center;">
                <i class="fas fa-radio" style="font-size: 30px; color: var(--primary); margin-right: 15px;"></i>
                <div>
                    <strong>Rádio Conexão</strong><br>
                    <small>Ao Vivo</small>
                </div>
            </div>
            
            <!-- LINK DO STREAMING CORRIGIDO -->
            <audio controls autoplay>
                <source src="https://stm6.painelvox.com:6920/;stream" type="audio/mpeg">
                Seu navegador não suporta o player.
            </audio>

            <div class="social-icons">
                <a href="https://wa.me/SEUNUMERO" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </div>

</body>
</html>
