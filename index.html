<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rádio Conexão FM 87,9 – João Neiva/ES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --primary: #C0392B; --primary-dark: #8B1A10; --primary-light: #E74C3C;
      --accent: #E85C00; --accent-light: #F5A623; --bg: #FFF8F5;
      --bg-card: #FFFFFF; --bg-section: #FFF0EB; --text-dark: #2C1A17;
      --text-mid: #5C3A33; --text-light: #9E6B60; --border: #F0D5CE;
      --shadow: 0 4px 20px rgba(192,57,43,0.10); --radius: 14px; --radius-sm: 8px;
      --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text-dark); line-height: 1.6; }
    h1, h2, h3, h4, h5 { font-family: 'Montserrat', sans-serif; font-weight: 700; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    /* TOPBAR & HEADER */
    #topbar { background: var(--primary-dark); color: #fff; font-size: 0.78rem; padding: 6px 0; }
    #topbar .container { display: flex; justify-content: space-between; align-items: center; }
    .topbar-social a { margin-left: 12px; }
    header { background: #fff; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; max-width: 1200px; margin: 0 auto; }
    .nav-links { display: flex; list-style: none; gap: 6px; }
    .nav-links a { padding: 8px 14px; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.85rem; }
    .nav-links a.active, .nav-links a:hover { background: var(--primary); color: #fff; }
    .hamburger { display: none; background: none; border: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; }

    /* PLAYER */
    #live-player { background: linear-gradient(135deg, var(--primary-dark), var(--accent)); color: #fff; padding: 20px 0; }
    .player-inner { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .player-controls { display: flex; align-items: center; gap: 14px; }
    #btn-play-live { width: 56px; height: 56px; border-radius: 50%; background: #fff; color: var(--primary); border: none; cursor: pointer; font-size: 1.4rem; }
    
    /* CARDS */
    section { padding: 60px 0; }
    .section-alt { background: var(--bg-section); }
    .section-header { text-align: center; margin-bottom: 40px; }
    .divider { width: 60px; height: 4px; background: var(--primary); margin: 12px auto; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .card { background: #fff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .card-img-placeholder { height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #ccc; }
    .card-body { padding: 20px; }
    .card-tag { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
    
    @media (max-width: 600px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; right: 0; background: #fff; padding: 20px; }
      .nav-links.open { display: flex; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

<div id="topbar">
  <div class="container">
    <span><i class="fas fa-broadcast-tower"></i> 87,9 FM - João Neiva/ES</span>
    <div class="topbar-social">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-facebook"></i></a>
    </div>
  </div>
</div>

<header>
  <nav>
    <div style="font-weight:800; color:var(--primary-dark)">CONEXÃO FM</div>
    <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" class="active">Início</a></li>
      <li><a href="#destaques">Destaques</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>
</header>

<section id="live-player">
  <div class="container">
    <div class="player-inner">
      <button id="btn-play-live" onclick="toggleLive()"><i class="fas fa-play" id="play-icon"></i></button>
      <div>
        <div style="font-size: 0.7rem; background: red; display: inline-block; padding: 2px 5px; border-radius: 3px;">AO VIVO</div>
        <h2>Rádio Conexão FM</h2>
      </div>
      <audio id="audio-live"><source src="http://stm1.painelvox.com:6920/stream" type="audio/mpeg"></audio>
    </div>
  </div>
</section>

<section id="destaques" class="section-alt">
  <div class="container">
    <div class="section-header">
      <h2>Destaques</h2>
      <div class="divider"></div>
    </div>
    <div class="cards-grid" id="container-noticias">
        </div>
  </div>
</section>

<script>
  // SISTEMA AUTOMÁTICO DE NOTÍCIAS
  async function carregarNoticias() {
    const container = document.getElementById('container-noticias');
    try {
      const resposta = await fetch('noticias.json');
      const dados = await resposta.json();
      container.innerHTML = '';
      dados.forEach(item => {
        container.innerHTML += `
          <div class="card">
            <div class="card-img-placeholder"><i class="fas fa-newspaper"></i></div>
            <div class="card-body">
              <div class="card-tag">${item.tag}</div>
              <h3>${item.titulo}</h3>
              <p>${item.descricao}</p>
              <br>
              <a href="${item.link}" class="btn" style="color:var(--primary); font-weight:700">Ver mais →</a>
            </div>
          </div>`;
      });
    } catch (e) {
      container.innerHTML = "Erro ao carregar notícias.";
    }
  }

  // PLAYER
  const audio = document.getElementById('audio-live');
  function toggleLive() {
    const icon = document.getElementById('play-icon');
    if (audio.paused) { audio.play(); icon.classList.replace('fa-play', 'fa-pause'); }
    else { audio.pause(); icon.classList.replace('fa-pause', 'fa-play'); }
  }

  // MENU
  function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }

  window.onload = carregarNoticias;
</script>
</body>
</html>
