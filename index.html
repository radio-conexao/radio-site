<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rádio Conexão FM 87,9 – João Neiva/ES</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --primary: #C0392B; --primary-dark: #8B1A10; --primary-light: #E74C3C;
      --accent: #E85C00; --accent-light: #F5A623; --bg: #FFF8F5;
      --bg-card: #FFFFFF; --bg-section: #FFF0EB; --text-dark: #2C1A17;
      --text-mid: #5C3A33; --text-light: #9E6B60; --border: #F0D5CE;
      --shadow: 0 4px 20px rgba(192,57,43,0.10); --radius: 14px; --radius-sm: 8px;
      --transition: 0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text-dark); line-height: 1.6; }
    h1, h2, h3, h4, h5 { font-family: 'Montserrat', sans-serif; font-weight: 700; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    /* HEADER */
    #topbar { background: var(--primary-dark); color: #fff; font-size: 0.78rem; padding: 6px 0; }
    #topbar .container { display: flex; justify-content: space-between; align-items: center; }
    header { background: #fff; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; max-width: 1200px; margin: 0 auto; }
    .nav-links { display: flex; list-style: none; gap: 6px; }
    .nav-links a { padding: 8px 14px; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.85rem; }
    .nav-links a.active, .nav-links a:hover { background: var(--primary); color: #fff; }
    .hamburger { display: none; background: none; border: none; font-size: 1.5rem; color: var(--primary); cursor: pointer; }

    /* SEÇÕES */
    section { padding: 60px 0; }
    .section-alt { background: var(--bg-section); }
    .section-header { text-align: center; margin-bottom: 40px; }
    .divider { width: 60px; height: 4px; background: var(--primary); margin: 12px auto; }

    /* PLAYER */
    #live-player { background: linear-gradient(135deg, var(--primary-dark), var(--accent)); color: #fff; padding: 20px 0; }
    .player-inner { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    #btn-play-live { width: 56px; height: 56px; border-radius: 50%; background: #fff; color: var(--primary); border: none; cursor: pointer; font-size: 1.4rem; }

    /* GRID CARDS (Notícias) */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .card { background: #fff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
    .card-body { padding: 20px; }
    .card-tag { color: var(--accent); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }

    /* TOP 10 */
    .top10-list { display: flex; flex-direction: column; gap: 12px; }
    .top10-item { display: flex; align-items: center; gap: 14px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
    .top10-rank { font-weight: 800; font-size: 1.5rem; width: 40px; text-align: center; }
    .gold { color: #FFD700; } .silver { color: #C0C0C0; } .bronze { color: #CD7F32; }

    /* PROGRAMAÇÃO */
    .prog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .prog-card { background: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); display: flex; gap: 15px; align-items: center; }

    @media (max-width: 600px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 80px; left: 0; right: 0; background: #fff; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
      .nav-links.open { display: flex; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

<div id="topbar">
  <div class="container">
    <span><i class="fas fa-broadcast-tower"></i> 87,9 FM - João Neiva/ES</span>
  </div>
</div>

<header>
  <nav>
    <div style="font-weight:800; color:var(--primary-dark)">CONEXÃO FM</div>
    <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#" class="active">Início</a></li>
      <li><a href="#destaques">Destaques</a></li>
      <li><a href="#top10">Top 10</a></li>
      <li><a href="#programacao">Programação</a></li>
    </ul>
  </nav>
</header>

<section id="live-player">
  <div class="container">
    <div class="player-inner">
      <button id="btn-play-live" onclick="toggleLive()"><i class="fas fa-play" id="play-icon"></i></button>
      <div>
        <div style="font-size: 0.7rem; background: red; display: inline-block; padding: 2px 5px; border-radius: 3px;">AO VIVO</div>
        <h2>Rádio Conexão FM</h2>
      </div>
      <audio id="audio-live"><source src="http://stm1.painelvox.com:6920/stream" type="audio/mpeg"></audio>
    </div>
  </div>
</section>

<section id="destaques" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>Destaques</h2><div class="divider"></div></div>
    <div class="cards-grid" id="container-noticias"></div>
  </div>
</section>

<section id="top10">
  <div class="container">
    <div class="section-header"><h2>Top 10</h2><div class="divider"></div></div>
    <div class="top10-list" id="lista-top10"></div>
  </div>
</section>

<section id="programacao" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>Programação</h2><div class="divider"></div></div>
    <div class="prog-grid" id="grid-programacao"></div>
  </div>
</section>

<script>
  // FUNÇÃO PARA CARREGAR QUALQUER JSON
  async function fetchData(file) {
    try {
      const response = await fetch(file + '?v=' + Date.now()); // Evita cache
      return await response.json();
    } catch (e) { console.error("Erro ao carregar " + file, e); return null; }
  }

  // CARREGAR NOTÍCIAS
  async function renderNoticias() {
    const data = await fetchData('noticias.json');
    if (!data) return;
    const container = document.getElementById('container-noticias');
    container.innerHTML = data.map(item => `
      <div class="card">
        <div class="card-body">
          <div class="card-tag">${item.tag}</div>
          <h3>${item.titulo}</h3>
          <p>${item.descricao}</p>
          <br><a href="${item.link}" class="btn" style="color:var(--primary); font-weight:700">Ver mais →</a>
        </div>
      </div>`).join('');
  }

  // CARREGAR TOP 10
  async function renderTop10() {
    const data = await fetchData('top10.json');
    if (!data) return;
    const container = document.getElementById('lista-top10');
    container.innerHTML = data.map(item => `
      <div class="top10-item">
        <div class="top10-rank ${item.status || ''}">${item.posicao}</div>
        <div class="top10-meta"><strong>${item.musica}</strong><br><span>${item.artista}</span></div>
      </div>`).join('');
  }

  // CARREGAR PROGRAMAÇÃO
  async function renderProgramacao() {
    const data = await fetchData('programacao.json');
    if (!data) return;
    const container = document.getElementById('grid-programacao');
    container.innerHTML = data.map(item => `
      <div class="prog-card">
        <div style="font-weight:800; color:var(--primary)">${item.horario}</div>
        <div><strong>${item.programa}</strong><br><small>${item.locutor}</small></div>
      </div>`).join('');
  }

  // CONTROLES GERAIS
  const audio = document.getElementById('audio-live');
  function toggleLive() {
    const icon = document.getElementById('play-icon');
    if (audio.paused) { audio.play(); icon.classList.replace('fa-play', 'fa-pause'); }
    else { audio.pause(); icon.classList.replace('fa-pause', 'fa-play'); }
  }
  function toggleMenu() { document.getElementById('navLinks').classList.toggle('open'); }

  window.onload = () => { renderNoticias(); renderTop10(); renderProgramacao(); };
</script>
</body>
</html>
