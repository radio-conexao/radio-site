<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Conexão - A rádio que te liga</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: var(--text);
            margin: 0;
            padding-bottom: 120px;
        }

        /* Header e Logo */
        header { 
            background: var(--secondary); 
            padding: 20px; 
            text-align: center; 
            border-bottom: 3px solid var(--primary); 
        }
        .logo { max-width: 220px; height: auto; }

        /* Banner */
        .banner-container { width: 100%; overflow: hidden; background: #111; }
        .banner-container img { width: 100%; display: block; }

        /* Container Geral */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        h2 { 
            color: var(--primary); 
            border-left: 5px solid var(--primary); 
            padding-left: 15px; 
            text-transform: uppercase; 
            margin: 40px 0 25px; 
            font-size: 1.5rem;
        }

        /* Grid de Entrevistas */
        .entrevistas-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
        }
        .card { 
            background: #111; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #333; 
            transition: 0.3s ease; 
        }
        .card:hover { 
            border-color: var(--primary); 
            transform: translateY(-8px); 
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.1);
        }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { margin: 0 0 10px; font-size: 1.2rem; }
        .card-body p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
        .btn-ouvir { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-ouvir:hover { filter: brightness(1.2); }

        /* Top 10 List */
        .top10-item { 
            display: flex; 
            align-items: center; 
            background: #111; 
            margin-bottom: 12px; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid #222; 
        }
        .posicao { font-size: 28px; font-weight: bold; width: 50px; color: var(--primary); text-align: center; }
        .capa-musica { width: 65px; height: 65px; border-radius: 8px; margin: 0 20px; object-fit: cover; }
        .info-musica { flex-grow: 1; }
        .musica-nome { display: block; font-weight: bold; font-size: 1.1rem; }
        .artista-nome { color: #888; font-size: 0.95rem; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: bold; margin-left: 10px; }
        .gold { background: linear-gradient(45deg, #ffd700, #ffae00); color: #000; }
        .silver { background: linear-gradient(45deg, #c0c0c0, #808080); color: #000; }
        .bronze { background: linear-gradient(45deg, #cd7f32, #8b4513); color: #fff; }

        /* Player Fixo Rodapé */
        .player-fixo { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            background: rgba(10, 10, 10, 0.98); 
            backdrop-filter: blur(15px);
            border-top: 3px solid var(--primary); 
            padding: 15px 0; 
            z-index: 1000; 
        }
        .player-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            flex-wrap: wrap; 
        }
        .info-live { display: flex; align-items: center; gap: 15px; }
        .live-dot { height: 10px; width: 10px; background-color: #ff0000; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            70% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.9); opacity: 0; }
        }

        audio { height: 40px; border-radius: 8px; filter: drop-shadow(0 0 5px var(--primary)); }

        .social-footer a { color: var(--text); font-size: 1.5rem; margin-left: 15px; transition: 0.3s; }
        .social-footer a:hover { color: var(--primary); }

        @media (max-width: 768px) {
            .player-content { flex-direction: column; gap: 15px; text-align: center; }
            .info-live { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <!-- Nome exato do seu arquivo no GitHub -->
        <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/logo%20sem%20fundo%20conexao.png" alt="Rádio Conexão" class="logo">
    </header>

    <div class="banner-container">
        <!-- Banner Principal -->
        <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/BANNER%202.jpg" alt="Destaque Rádio Conexão">
    </div>

    <div class="container">
        
        <!-- SEÇÃO: ÚLTIMAS ENTREVISTAS -->
        <section id="entrevistas">
            <h2><i class="fas fa-microphone-lines"></i> Últimas Entrevistas</h2>
            <div class="entrevistas-grid">
                
                <!-- Entrevista 01 -->
                <div class="card">
                    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista1.png" alt="Entrevista 1">
                    <div class="card-body">
                        <h3>Destaque da Semana</h3>
                        <p>Acompanhe nosso bate-papo exclusivo sobre cultura e música.</p>
                        <button class="btn-ouvir" onclick="window.open('#')">Ouvir Agora</button>
                    </div>
                </div>

                <!-- Entrevista 02 -->
                <div class="card">
                    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista2.png" alt="Entrevista 2">
                    <div class="card-body">
                        <h3>Especial Conexão</h3>
                        <p>Entrevistas que conectam você aos melhores artistas.</p>
                        <button class="btn-ouvir" onclick="window.open('#')">Ouvir Agora</button>
                    </div>
                </div>

                <!-- Entrevista 03 -->
                <div class="card">
                    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista3.png" alt="Entrevista 3">
                    <div class="card-body">
                        <h3>Momento Entrevista</h3>
                        <p>Fique por dentro de tudo que rola nos bastidores.</p>
                        <button class="btn-ouvir" onclick="window.open('#')">Ouvir Agora</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- SEÇÃO: TOP 10 SEMANAL -->
        <section id="ranking">
            <h2><i class="fas fa-chart-line"></i> Top 10 Mais Pedidas</h2>
            <div id="top10-lista">
                <!-- Preenchido via JavaScript (top10.json) -->
            </div>
        </section>

    </div>

    <!-- PLAYER FIXO RODAPÉ -->
    <div class="player-fixo">
        <div class="player-content">
            <div class="info-live">
                <div class="live-dot"></div>
                <div>
                    <strong>AO VIVO</strong><br>
                    <small>Rádio Conexão</small>
                </div>
            </div>
            
            <!-- LINK DO STREAMING COM SSL CORRIGIDO -->
            <audio controls>
                <source src="https://stm6.painelvox.com:6920/;stream" type="audio/mpeg">
                Seu navegador não suporta áudio HTML5.
            </audio>

            <div class="social-footer">
                <a href="https://wa.me/SEU_NUMERO" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <!-- SCRIPT PARA CARREGAR O TOP 10 AUTOMATICAMENTE -->
    <script>
        fetch('top10.json')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('top10-lista');
                data.forEach(item => {
                    const statusClass = item.status ? `badge ${item.status}` : '';
                    let statusText = "";
                    if(item.status === 'gold') statusText = "Ouro";
                    else if(item.status === 'silver') statusText = "Prata";
                    else if(item.status === 'bronze') statusText = "Bronze";
                    
                    lista.innerHTML += `
                        <div class="top10-item">
                            <div class="posicao">${item.posicao}º</div>
                            <img src="${item.imagem}" class="capa-musica">
                            <div class="info-musica">
                                <span class="musica-nome">${item.musica}</span>
                                <span class="artista-nome">${item.artista}</span>
                            </div>
                            ${item.status ? `<span class="${statusClass}">${statusText}</span>` : ''}
                        </div>
                    `;
                });
            })
            .catch(err => {
                console.error('Erro ao carregar Top 10:', err);
                document.getElementById('top10-lista').innerHTML = "<p>Erro ao carregar o ranking.</p>";
            });
    </script>

</body>
</html>
