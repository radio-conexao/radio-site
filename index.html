<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Conexão FM 87,9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #000; color: white; margin: 0; padding: 0; padding-bottom: 120px; }
        
        /* Header */
        header { background-color: #000; padding: 15px; text-align: center; border-bottom: 2px solid #ffcc00; }
        .logo { max-width: 180px; }

        /* Banner Ajustado (Menor para caber conteúdo abaixo) */
        .banner-container { width: 100%; max-height: 400px; overflow: hidden; border-bottom: 2px solid #ffcc00; }
        .banner-container img { width: 100%; height: auto; display: block; }
        
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        
        .titulo-secao { color: #ffcc00; border-left: 5px solid #ffcc00; padding-left: 15px; margin: 40px 0 20px; text-transform: uppercase; font-size: 1.4rem; }

        /* Entrevistas */
        .grid-entrevistas { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #ffcc00; transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        .btn-ouvir { background: #ffcc00; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }

        /* Notícias e Top 10 */
        .item-lista { background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .img-lista { width: 80px; height: 80px; border-radius: 5px; object-fit: cover; }

        /* Player Fixo */
        .player-footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 0; border-top: 3px solid #ffcc00; z-index: 1000; }
        .player-flex { max-width: 1100px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-wrap: wrap; }
        audio { height: 35px; border-radius: 5px; }

        @media (max-width: 600px) { .player-flex { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/logo%20sem%20fundo%20conexao.png" class="logo">
</header>

<div class="banner-container">
    <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/BANNER%202.jpg">
</div>

<div class="container">
    
    <h2 class="titulo-secao">Últimas Entrevistas</h2>
    <div class="grid-entrevistas">
        <div class="card">
            <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista1.png">
            <div class="card-body">
                <h3>Entrevista 01</h3>
                <p>Confira os detalhes desta conversa exclusiva.</p>
                <button class="btn-ouvir">Ouvir Entrevista</button>
            </div>
        </div>
        <div class="card">
            <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista2.png">
            <div class="card-body">
                <h3>Entrevista 02</h3>
                <p>Mais uma conexão importante para você.</p>
                <button class="btn-ouvir">Ouvir Entrevista</button>
            </div>
        </div>
        <div class="card">
            <img src="https://raw.githubusercontent.com/radio-conexao/radio-site/main/content/entrevista3.png">
            <div class="card-body">
                <h3>Entrevista 03</h3>
                <p>Tudo o que rolou nos nossos estúdios.</p>
                <button class="btn-ouvir">Ouvir Entrevista</button>
            </div>
        </div>
    </div>

    <h2 class="titulo-secao">Top 10 - As Mais Pedidas</h2>
    <div id="top10-lista"></div>

    <h2 class="titulo-secao">Notícias Relacionadas</h2>
    <div id="noticias-lista"></div>

</div>

<div class="player-footer">
    <div class="player-flex">
        <div><strong>Rádio Conexão:</strong> Ao Vivo</div>
        <audio controls>
            <source src="https://stm6.painelvox.com:6920/;stream" type="audio/mpeg">
        </audio>
        <div class="social">
            <a href="#" style="color:#25d366; font-size: 25px;"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</div>

<script>
    // Carrega Top 10
    fetch('top10.json').then(r => r.json()).then(data => {
        const div = document.getElementById('top10-lista');
        data.slice(0, 5).forEach(i => {
            div.innerHTML += `<div class="item-lista"><img src="${i.imagem}" class="img-lista"><div><strong>${i.posicao}º ${i.musica}</strong><br><small>${i.artista}</small></div></div>`;
        });
    });

    // Carrega Notícias
    fetch('noticias.json').then(r => r.json()).then(data => {
        const div = document.getElementById('noticias-lista');
        data.forEach(i => {
            div.innerHTML += `<div class="item-lista"><div><strong>${i.titulo}</strong><p style="font-size:0.9rem; color:#aaa; margin:5px 0;">${i.descricao}</p></div></div>`;
        });
    });
</script>

</body>
</html>
