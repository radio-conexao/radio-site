<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rádio Conexão FM 87,9 – João Neiva/ES</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --primary: #C0392B; --primary-dark: #8B1A10; --bg: #FFF8F5;
      --bg-section: #FFF0EB; --text-dark: #2C1A17; --border: #F0D5CE;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 110px; overflow-x: hidden; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    .divider { width: 50px; height: 4px; background: var(--primary); margin: 10px auto 30px; border-radius: 2px; }

    /* HEADER */
    header { background: #fff; border-bottom: 3px solid var(--primary); padding: 10px 0; position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; align-items: center; justify-content: space-between; }
    .logo-container img { height: 55px; width: auto; }
    .social-links a { color: var(--primary); margin-left: 12px; font-size: 1.2rem; text-decoration: none; }

    /* CARROSSEL */
    #hero { padding: 15px 0; }
    .carousel-container { position: relative; border-radius: var(--radius); overflow: hidden; background: #000; aspect-ratio: 21/9; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .carousel-slide { display: none; width: 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }

    /* SEÇÕES GERAIS */
    section { padding: 35px 0; display: block !important; }
    .section-alt { background: var(--bg-section); }
    .section-header { text-align: center; }

    /* GRIDS RESISTENTES */
    .grid-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .card-item { background: #fff; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); width: 100%; max-width: 350px; flex-grow: 1; }
    
    /* AUDIO PLAYERS */
    audio { width: 100%; height: 35px; margin-top: 10px; }

    /* TOP 10 */
    .top10-list { max-width: 600px; margin: 0 auto; }
    .top10-item { display: flex; align-items: center; gap: 15px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 10px; }
    .top10-img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }

    /* PLAYER FIXO */
    #fixed-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: #fff; padding: 12px 0; z-index: 2000; }
    .player-content { display: flex; align-items: center; justify-content: space-between; }
    #btn-play { width: 50px; height: 50px; border-radius: 50%; border: none; background: #fff; color: var(--primary); font-size: 1.3rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .live-text { flex-grow: 1; margin-left: 12px; line-height: 1.2; }
    .social-footer { display: flex; gap: 8px; }
    .btn-icon { background: rgba(255,255,255,0.2); color: #fff; padding: 10px; border-radius: 50%; text-decoration: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

    @media (max-width: 600px) {
      .carousel-container { aspect-ratio: 16/9; }
      .live-text p { display: none; }
      .card-item { max-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <nav class="container">
    <div id="logo-place" class="logo-container"></div>
    <div class="social-links">
      <a href="https://www.instagram.com/conexaojoaoneiva/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://wa.me/5527998184266" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
  </nav>
</header>

<section id="hero">
  <div class="container"><div class="carousel-container" id="carousel-box"></div></div>
</section>

<section id="podcasts">
  <div class="container">
    <div class="section-header"><h2>Entrevistas</h2><div class="divider"></div></div>
    <div class="grid-layout" id="pod-render"></div>
  </div>
</section>

<section id="destaques" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>Destaques</h2><div class="divider"></div></div>
    <div class="grid-layout" id="news-render"></div>
  </div>
</section>

<section id="top10">
  <div class="container">
    <div class="section-header"><h2>As 10 Mais</h2><div class="divider"></div></div>
    <div id="top10-render" class="top10-list"></div>
  </div>
</section>

<section id="programacao" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>Programação</h2><div class="divider"></div></div>
    <div class="grid-layout" id="prog-render"></div>
  </div>
</section>

<div id="fixed-player">
  <div class="container player-content">
    <button id="btn-play" onclick="toggleRadio()"><i class="fas fa-play" id="play-icon"></i></button>
    <div class="live-text">
      <strong>AO VIVO</strong><br>
      <small>Conexão FM 87,9</small>
    </div>
    <div class="social-footer">
      <a href="https://wa.me/5527998184266" target="_blank" class="btn-icon" style="background: #25D366;"><i class="fab fa-whatsapp"></i></a>
      <a href="https://www.instagram.com/conexaojoaoneiva/" target="_blank" class="btn-icon" style="background: #E1306C;"><i class="fab fa-instagram"></i></a>
    </div>
  </div>
</div>

<audio id="radio-audio"><source src="https://stm6.painelvox.com:6920/;stream" type="audio/mpeg"></audio>

<script>
  async function getData(file) {
    try {
      const resp = await fetch(file + '?v=' + Date.now());
      return resp.ok ? await resp.json() : null;
    } catch(e) { return null; }
  }

  // Carrossel
  let currentSlide = 0;
  function runCarousel() {
    const slides = document.querySelectorAll('.carousel-slide');
    if(slides.length === 0) return;
    slides.forEach(s => s.style.display = 'none');
    currentSlide = (currentSlide + 1) > slides.length ? 1 : currentSlide + 1;
    slides[currentSlide-1].style.display = 'block';
    setTimeout(runCarousel, 5000);
  }

  async function start() {
    // Logo e Banner
    const b = await getData('banners.json');
    if(b) {
      document.getElementById('logo-place').innerHTML = `<img src="${b.logo}">`;
      document.getElementById('carousel-box').innerHTML = b.carrossel.map(c => `<div class="carousel-slide"><img src="${c.imagem}"></div>`).join('');
      runCarousel();
    }

    // Entrevistas
    const p = await getData('podcasts.json');
    if(p) document.getElementById('pod-render').innerHTML = p.map(i => `
      <div class="card-item">
        <h4 style="color:var(--primary)">${i.titulo}</h4><p style="font-size:0.8rem">${i.descricao}</p>
        <audio controls preload="none"><source src="${i.audio}" type="audio/mpeg"></audio>
      </div>`).join('');

    // Notícias
    const n = await getData('noticias.json');
    if(n) document.getElementById('news-render').innerHTML = n.map(i => `
      <div class="card-item">
        <strong>#${i.tag}</strong><h3>${i.titulo}</h3><p style="font-size:0.85rem">${i.descricao}</p>
      </div>`).join('');

    // Top 10
    const t = await getData('top10.json');
    if(t) document.getElementById('top10-render').innerHTML = t.map(i => `
      <div class="top10-item">
        <span style="width:25px;font-weight:bold">${i.posicao}º</span>
        <img src="${i.imagem}" class="top10-img">
        <div><strong>${i.musica}</strong><br><small>${i.artista}</small></div>
      </div>`).join('');

    // Programação
    const prog = await getData('programacao.json');
    if(prog) document.getElementById('prog-render').innerHTML = prog.map(i => `
      <div class="card-item" style="border-left:4px solid var(--primary)">
        <strong>${i.horario}</strong> - ${i.programa}
      </div>`).join('');
  }

  // Player de Rádio
  const rad = document.getElementById('radio-audio');
  const btnIco = document.getElementById('play-icon');
  function toggleRadio() {
    if(rad.paused) { rad.play(); btnIco.className = 'fas fa-pause'; }
    else { rad.pause(); btnIco.className = 'fas fa-play'; }
  }

  window.onload = start;
</script>
</body>
</html>
