<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rádio Conexão FM 87,9 – João Neiva/ES</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --primary: #C0392B; --primary-dark: #8B1A10; --bg: #FFF8F5;
      --bg-section: #FFF0EB; --text-dark: #2C1A17; --border: #F0D5CE;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text-dark); padding-bottom: 100px; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    .divider { width: 50px; height: 4px; background: var(--primary); margin: 10px auto 30px; border-radius: 2px; }

    /* HEADER */
    header { background: #fff; border-bottom: 3px solid var(--primary); padding: 8px 0; position: sticky; top: 0; z-index: 1000; }
    nav { display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 20px; }
    
    /* LOGO MAIOR NO PC */
    .logo-container img { height: 85px; width: auto; transition: 0.3s; }
    .header-phrase { font-family: 'Montserrat'; font-weight: 800; color: var(--primary); font-size: 1.1rem; text-transform: uppercase; }
    
    .social-links { display: flex; gap: 15px; }
    .social-links a { color: var(--primary); font-size: 1.5rem; text-decoration: none; }

    /* CARROSSEL */
    #hero { padding: 10px 0; }
    .carousel-container { position: relative; border-radius: var(--radius); overflow: hidden; background: #000; aspect-ratio: 21/9; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .carousel-slide { display: none; width: 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }

    /* SEÇÕES */
    section { padding: 35px 0; }
    .section-alt { background: var(--bg-section); }
    .section-header { text-align: center; }

    /* GRID GERAL */
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card-item { background: #fff; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }

    /* PROGRAMAÇÃO COM IMAGEM */
    .prog-item { display: flex; align-items: center; gap: 15px; }
    .prog-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid var(--border); }
    .prog-info { flex: 1; }

    /* TOP 10 */
    .top10-list { max-width: 650px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    .top10-item { display: flex; align-items: center; gap: 15px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
    .top10-img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }

    /* PLAYER FIXO - ALTURA REDUZIDA */
    #fixed-player { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: #fff; padding: 8px 0; z-index: 2000; height: 85px; display: flex; align-items: center; }
    .player-content { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    #btn-play { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff; color: var(--primary); font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .live-info { flex-grow: 1; margin-left: 15px; }
    .social-footer { display: flex; gap: 10px; }
    .footer-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; font-size: 1.1rem; }

    @media (max-width: 768px) {
      .logo-container img { height: 50px; }
      .header-phrase { font-size: 0.7rem; }
      .carousel-container { aspect-ratio: 16/9; }
      #fixed-player { height: 75px; }
      .prog-img { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>

<header>
  <nav class="container">
    <div class="header-left">
      <div id="logo-place" class="logo-container"></div>
      <span class="header-phrase">A sua rádio conectada em você!</span>
    </div>
    <div class="social-links">
      <a href="https://www.facebook.com/conexaofm87" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="https://www.instagram.com/conexaojoaoneiva/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://wa.me/5527998184266" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
  </nav>
</header>

<section id="hero">
  <div class="container"><div class="carousel-container" id="carousel-box"></div></div>
</section>

<section id="podcasts">
  <div class="container">
    <div class="section-header"><h2>Últimas Entrevistas</h2><div class="divider"></div></div>
    <div class="grid-layout" id="pod-render"></div>
  </div>
</section>

<section id="destaques" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>Destaques</h2><div class="divider"></div></div>
    <div class="grid-layout" id="news-render"></div>
  </div>
</section>

<section id="programacao">
  <div class="container">
    <div class="section-header"><h2>Programação</h2><div class="divider"></div></div>
    <div class="grid-layout" id="prog-render"></div>
  </div>
</section>

<section id="top10" class="section-alt">
  <div class="container">
    <div class="section-header"><h2>As Mais Pedidas</h2><div class="divider"></div></div>
    <div id="top10-render" class="top10-list"></div>
  </div>
</section>

<div id="fixed-player">
  <div class="container player-content">
    <button id="btn-play" onclick="toggleRadio()"><i class="fas fa-play" id="play-icon"></i></button>
    <div class="live-info">
      <strong style="font-size: 1rem; text-transform: uppercase;">Ouça Agora</strong><br>
      <small style="opacity: 0.9; font-size: 0.75rem;">Conexão FM 87,9 - Ao Vivo</small>
    </div>
    <div class="social-footer">
      <a href="https://wa.me/5527998184266" target="_blank" class="footer-icon" style="background: #25D366;"><i class="fab fa-whatsapp"></i></a>
      <a href="https://www.instagram.com/conexaojoaoneiva/" target="_blank" class="footer-icon" style="background: #E1306C;"><i class="fab fa-instagram"></i></a>
      <a href="https://www.facebook.com/conexaofm87" target="_blank" class="footer-icon" style="background: #4267B2;"><i class="fab fa-facebook-f"></i></a>
    </div>
  </div>
</div>

<audio id="radio-audio"><source src="https://stm6.painelvox.com:6920/;stream" type="audio/mpeg"></audio>

<script>
  async function getData(file) {
    try {
      const resp = await fetch(file + '?v=' + Date.now());
      return resp.ok ? await resp.json() : null;
    } catch(e) { return null; }
  }

  let currentSlide = 0;
  function runCarousel() {
    const slides = document.querySelectorAll('.carousel-slide');
    if(slides.length === 0) return;
    slides.forEach(s => s.style.display = 'none');
    currentSlide = (currentSlide + 1) > slides.length ? 1 : currentSlide + 1;
    slides[currentSlide-1].style.display = 'block';
    setTimeout(runCarousel, 5000);
  }

  async function start() {
    const b = await getData('banners.json');
    if(b) {
      document.getElementById('logo-place').innerHTML = `<img src="${b.logo}" alt="Logo">`;
      document.getElementById('carousel-box').innerHTML = b.carrossel.map(c => `<div class="carousel-slide"><img src="${c.imagem}"></div>`).join('');
      runCarousel();
    }

    const p = await getData('podcasts.json');
    if(p) {
      document.getElementById('pod-render').innerHTML = p.slice(0, 3).map(i => `
        <div class="card-item">
          <h4 style="color:var(--primary)">${i.titulo}</h4>
          <p style="font-size:0.85rem; margin-bottom:10px;">${i.descricao}</p>
          <audio controls preload="none"><source src="${i.audio}" type="audio/mpeg"></audio>
        </div>`).join('');
    }

    const n = await getData('noticias.json');
    if(n) document.getElementById('news-render').innerHTML = n.map(i => `
      <div class="card-item">
        <strong style="color:var(--primary)">#${i.tag}</strong>
        <h3>${i.titulo}</h3>
        <p style="font-size:0.8rem">${i.descricao}</p>
      </div>`).join('');

    const t = await getData('top10.json');
    if(t) document.getElementById('top10-render').innerHTML = t.map(i => `
      <div class="top10-item">
        <span style="font-weight:bold; width:30px;">${i.posicao}º</span>
        <img src="${i.imagem}" class="top10-img">
        <div><strong>${i.musica}</strong><br><small>${i.artista}</small></div>
      </div>`).join('');

    // PROGRAMAÇÃO COM SUPORTE A IMAGEM
    const prog = await getData('programacao.json');
    if(prog) document.getElementById('prog-render').innerHTML = prog.map(i => `
      <div class="card-item prog-item">
        <img src="${i.imagem || 'img/default-programa.jpg'}" class="prog-img">
        <div class="prog-info">
          <strong style="color:var(--primary)">${i.horario}</strong><br>
          <span style="font-weight:bold">${i.programa}</span><br>
          <small>${i.locutor}</small>
        </div>
      </div>`).join('');
  }

  const rad = document.getElementById('radio-audio');
  const btnIco = document.getElementById('play-icon');
  function toggleRadio() {
    if(rad.paused) { rad.play(); btnIco.className = 'fas fa-pause'; }
    else { rad.pause(); btnIco.className = 'fas fa-play'; }
  }

  window.onload = start;
</script>
</body>
</html>
